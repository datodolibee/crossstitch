<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cross Stitch Generator — Roseshaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e0ddd6;
      --text: #1a1a1a;
      --muted: #888880;
      --accent: #1a1a1a;
      --radius: 12px;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 28px 40px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header span {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
    }

    /* ── Controls Panel ── */
    .controls {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: #f9f9f7;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .upload-zone p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .upload-zone .filename {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      margin-top: 6px;
      word-break: break-all;
    }

    /* Mode toggle */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .mode-btn {
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Sliders */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .control-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-row label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 500;
    }

    .control-row label span {
      font-weight: 400;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 1px var(--accent);
    }

    /* Color pickers */
    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .color-picker {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .color-picker label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .color-picker input[type="color"] {
      width: 100%;
      height: 36px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      cursor: pointer;
      background: var(--surface);
    }

    /* Buttons */
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
      letter-spacing: -0.01em;
    }

    .btn-primary:hover { opacity: 0.82; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 11px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s;
    }

    .btn-secondary:hover { border-color: var(--accent); }
    .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-row { display: flex; flex-direction: column; gap: 8px; }

    /* ── Preview Area ── */
    .preview-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: auto;
      background: var(--bg);
    }

    .preview-empty {
      text-align: center;
      color: var(--muted);
    }

    .preview-empty .big-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.4;
      display: block;
    }

    .preview-empty p {
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-frame {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      padding: 24px;
      max-width: 100%;
      overflow: auto;
    }

    #svg-output {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .preview-meta {
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .spinner {
      display: none;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hidden canvas */
    #hidden-canvas { display: none; }
  </style>
</head>
<body>

<header>
  <h1>Cross Stitch Generator</h1>
  <span>Roseshaker</span>
</header>

<div class="workspace">

  <!-- Controls -->
  <aside class="controls">

    <!-- Upload -->
    <div>
      <p class="section-label">Image</p>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" />
        <span class="upload-icon">＋</span>
        <p>이미지를 드래그하거나<br>클릭해서 업로드하세요</p>
        <p class="filename" id="filename-display"></p>
      </div>
    </div>

    <!-- Mode -->
    <div>
      <p class="section-label">Mode</p>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="filled">Filled</button>
        <button class="mode-btn" data-mode="outline">Outline</button>
      </div>
    </div>

    <!-- Parameters -->
    <div>
      <p class="section-label">Parameters</p>
      <div class="control-group">

        <div class="control-row">
          <label>Stitch Size <span id="cell-val">10</span>px</label>
          <input type="range" id="cell-size" min="4" max="24" value="10" step="1" />
        </div>

        <div class="control-row">
          <label>Threshold <span id="thresh-val">128</span></label>
          <input type="range" id="threshold" min="1" max="254" value="128" step="1" />
        </div>

        <div class="control-row">
          <label>Stroke Width <span id="stroke-val">1.4</span></label>
          <input type="range" id="stroke-width" min="0.5" max="4" value="1.4" step="0.1" />
        </div>

        <div class="control-row">
          <label>Stitch Ratio <span id="ratio-val">0.70</span></label>
          <input type="range" id="stitch-ratio" min="0.3" max="0.95" value="0.70" step="0.01" />
        </div>

      </div>
    </div>

    <!-- Colors -->
    <div>
      <p class="section-label">Colors</p>
      <div class="color-row">
        <div class="color-picker">
          <label>Stitch</label>
          <input type="color" id="stitch-color" value="#1a1a1a" />
        </div>
        <div class="color-picker">
          <label>Background</label>
          <input type="color" id="bg-color" value="#ffffff" />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div>
      <p class="section-label">Export</p>
      <div class="btn-row">
        <button class="btn-primary" id="generate-btn" disabled>Generate</button>
        <button class="btn-secondary" id="download-btn" disabled>Download SVG</button>
      </div>
    </div>

  </aside>

  <!-- Preview -->
  <main class="preview-area" id="preview-area">
    <div class="preview-empty" id="preview-empty">
      <span class="big-icon">✕</span>
      <p>이미지를 업로드하고<br>Generate를 눌러주세요</p>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="preview-frame" id="preview-frame" style="display:none">
      <svg id="svg-output"></svg>
    </div>
    <p class="preview-meta" id="preview-meta"></p>
  </main>

</div>

<canvas id="hidden-canvas"></canvas>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentImage = null;
let currentMode = 'filled';
let currentSvgString = null;

// ── DOM refs ───────────────────────────────────────────────────────────────
const fileInput        = document.getElementById('file-input');
const uploadZone       = document.getElementById('upload-zone');
const filenameDisplay  = document.getElementById('filename-display');
const generateBtn      = document.getElementById('generate-btn');
const downloadBtn      = document.getElementById('download-btn');
const modeBtns         = document.querySelectorAll('.mode-btn');
const canvas           = document.getElementById('hidden-canvas');
const ctx              = canvas.getContext('2d', { willReadFrequently: true });
const svgOutput        = document.getElementById('svg-output');
const previewEmpty     = document.getElementById('preview-empty');
const previewFrame     = document.getElementById('preview-frame');
const previewMeta      = document.getElementById('preview-meta');
const spinner          = document.getElementById('spinner');

// Slider refs
const cellSizeEl    = document.getElementById('cell-size');
const thresholdEl   = document.getElementById('threshold');
const strokeWidthEl = document.getElementById('stroke-width');
const stitchRatioEl = document.getElementById('stitch-ratio');
const stitchColorEl = document.getElementById('stitch-color');
const bgColorEl     = document.getElementById('bg-color');

// Slider labels
const cellVal    = document.getElementById('cell-val');
const threshVal  = document.getElementById('thresh-val');
const strokeVal  = document.getElementById('stroke-val');
const ratioVal   = document.getElementById('ratio-val');

// ── Slider display ─────────────────────────────────────────────────────────
cellSizeEl.addEventListener('input',    () => cellVal.textContent = cellSizeEl.value);
thresholdEl.addEventListener('input',   () => threshVal.textContent = thresholdEl.value);
strokeWidthEl.addEventListener('input', () => strokeVal.textContent = parseFloat(strokeWidthEl.value).toFixed(1));
stitchRatioEl.addEventListener('input', () => ratioVal.textContent = parseFloat(stitchRatioEl.value).toFixed(2));

// ── File upload ────────────────────────────────────────────────────────────
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadImageFile(e.target.files[0]);
});

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadImageFile(e.dataTransfer.files[0]);
});

function loadImageFile(file) {
  if (!file.type.startsWith('image/')) return;
  filenameDisplay.textContent = file.name;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    currentImage = img;
    generateBtn.disabled = false;
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

// ── Mode toggle ────────────────────────────────────────────────────────────
modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    modeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    // Outline mode: lower default threshold display hint
    if (currentMode === 'outline') {
      thresholdEl.value = 40;
      threshVal.textContent = 40;
    } else {
      thresholdEl.value = 128;
      threshVal.textContent = 128;
    }
  });
});

// ── Generate ───────────────────────────────────────────────────────────────
generateBtn.addEventListener('click', generate);

function generate() {
  if (!currentImage) return;

  previewEmpty.style.display = 'none';
  previewFrame.style.display = 'none';
  spinner.style.display      = 'block';
  previewMeta.textContent    = '';

  // Use setTimeout to let UI update before heavy processing
  setTimeout(() => {
    try {
      const svgStr = buildSVG();
      currentSvgString = svgStr;
      renderPreview(svgStr);
      downloadBtn.disabled = false;
    } catch (err) {
      console.error(err);
    } finally {
      spinner.style.display = 'none';
    }
  }, 30);
}

// ── Core algorithm ─────────────────────────────────────────────────────────
function buildSVG() {
  const cellSize   = parseInt(cellSizeEl.value);
  const threshold  = parseInt(thresholdEl.value);
  const strokeW    = parseFloat(strokeWidthEl.value);
  const ratio      = parseFloat(stitchRatioEl.value);
  const stitchCol  = stitchColorEl.value;
  const bgCol      = bgColorEl.value;
  const mode       = currentMode;

  // Draw image to canvas (max 1200px wide for perf)
  const MAX = 1200;
  let w = currentImage.naturalWidth;
  let h = currentImage.naturalHeight;
  if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
  if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }

  canvas.width  = w;
  canvas.height = h;
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(currentImage, 0, 0, w, h);

  const imageData = ctx.getImageData(0, 0, w, h);
  const pixels    = imageData.data;

  // Convert to grayscale float array
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const r = pixels[i * 4];
    const g = pixels[i * 4 + 1];
    const b = pixels[i * 4 + 2];
    const a = pixels[i * 4 + 3];
    // If transparent, treat as white
    gray[i] = a < 10 ? 255 : (r * 0.299 + g * 0.587 + b * 0.114);
  }

  let stitches;

  if (mode === 'filled') {
    stitches = buildFilled(gray, w, h, cellSize, threshold);
  } else {
    stitches = buildOutline(gray, w, h, cellSize, threshold);
  }

  // Stitch arm half-length
  const arm = cellSize * ratio * 0.5;

  // Build SVG string
  const svgW = w;
  const svgH = h;

  let pathData = '';
  for (const [cx, cy] of stitches) {
    // Two diagonal lines making ×
    pathData += `M${(cx - arm).toFixed(1)},${(cy - arm).toFixed(1)}L${(cx + arm).toFixed(1)},${(cy + arm).toFixed(1)}`;
    pathData += `M${(cx + arm).toFixed(1)},${(cy - arm).toFixed(1)}L${(cx - arm).toFixed(1)},${(cy + arm).toFixed(1)}`;
  }

  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">
  <rect width="${svgW}" height="${svgH}" fill="${bgCol}"/>
  <path d="${pathData}" stroke="${stitchCol}" stroke-width="${strokeW}" stroke-linecap="round" fill="none"/>
</svg>`;

  const count = stitches.length;
  previewMeta.textContent = `${count.toLocaleString()} stitches · ${w}×${h}px`;

  return svgStr;
}

// Filled mode: sample average brightness per cell
function buildFilled(gray, w, h, cellSize, threshold) {
  const stitches = [];
  for (let cy = Math.floor(cellSize / 2); cy < h; cy += cellSize) {
    for (let cx = Math.floor(cellSize / 2); cx < w; cx += cellSize) {
      const brightness = sampleBrightness(gray, w, h, cx, cy, cellSize);
      if (brightness < threshold) {
        stitches.push([cx, cy]);
      }
    }
  }
  return stitches;
}

// Outline mode: Sobel edge detection, then sample per cell
function buildOutline(gray, w, h, cellSize, threshold) {
  const edges = sobelEdges(gray, w, h);

  // Normalize edges to 0-255
  let maxEdge = 0;
  for (let i = 0; i < edges.length; i++) {
    if (edges[i] > maxEdge) maxEdge = edges[i];
  }
  if (maxEdge === 0) maxEdge = 1;
  const edgeNorm = new Float32Array(edges.length);
  for (let i = 0; i < edges.length; i++) {
    edgeNorm[i] = (edges[i] / maxEdge) * 255;
  }

  const stitches = [];
  for (let cy = Math.floor(cellSize / 2); cy < h; cy += cellSize) {
    for (let cx = Math.floor(cellSize / 2); cx < w; cx += cellSize) {
      const strength = sampleBrightness(edgeNorm, w, h, cx, cy, cellSize);
      if (strength > threshold) {
        stitches.push([cx, cy]);
      }
    }
  }
  return stitches;
}

function sampleBrightness(gray, w, h, cx, cy, cellSize) {
  const half = Math.floor(cellSize / 2);
  const x0 = Math.max(0, cx - half);
  const y0 = Math.max(0, cy - half);
  const x1 = Math.min(w - 1, cx + half);
  const y1 = Math.min(h - 1, cy + half);
  let sum = 0, count = 0;
  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      sum += gray[y * w + x];
      count++;
    }
  }
  return count === 0 ? 255 : sum / count;
}

function sobelEdges(gray, w, h) {
  const edges = new Float32Array(w * h);
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const gx =
        -gray[(y - 1) * w + (x - 1)] + gray[(y - 1) * w + (x + 1)]
        - 2 * gray[y * w + (x - 1)] + 2 * gray[y * w + (x + 1)]
        - gray[(y + 1) * w + (x - 1)] + gray[(y + 1) * w + (x + 1)];
      const gy =
        -gray[(y - 1) * w + (x - 1)] - 2 * gray[(y - 1) * w + x] - gray[(y - 1) * w + (x + 1)]
        + gray[(y + 1) * w + (x - 1)] + 2 * gray[(y + 1) * w + x] + gray[(y + 1) * w + (x + 1)];
      edges[y * w + x] = Math.sqrt(gx * gx + gy * gy);
    }
  }
  return edges;
}

// ── Preview ────────────────────────────────────────────────────────────────
function renderPreview(svgStr) {
  svgOutput.outerHTML; // noop, use innerHTML approach
  previewFrame.innerHTML = svgStr;
  previewFrame.style.display = 'block';
}

// ── Download ───────────────────────────────────────────────────────────────
downloadBtn.addEventListener('click', () => {
  if (!currentSvgString) return;
  const blob = new Blob([currentSvgString], { type: 'image/svg+xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'cross-stitch.svg';
  a.click();
  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
